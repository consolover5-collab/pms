      - { id: packages-search-form,    element: "form",                  added: true }
      - { id: packages-search-input,   element: "input[text]",           added: true }
      - { id: packages-search-submit,  element: "button[submit]",        added: true }
      - { id: packages-clear,          element: "Link (clear search)",   added: true, note: "shown only when initialSearch is set" }
