  methodology_deltas:
    - "Scenario 04 drag-move encoded as a two-part DOM+API tripwire rather than skipped. The spec asserts (a) bars have `draggable !== 'true'` (UI has no drag wiring) and (b) POST /api/bookings/<random-uuid>/room-move still responds 404 with `code: 'BOOKING_NOT_FOUND'` (the real endpoint at bookings.ts:886 still exists). Earlier drafts wrongly claimed the backend endpoint was missing and probed a fabricated path — corrected to probe the real endpoint so the tripwire fires on genuine regression (UI grows drag wiring OR backend endpoint is removed/reshaped)."

