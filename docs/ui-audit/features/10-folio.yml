help_rewrite_hints:
  topic: null
  current: |
    В help-content.tsx нет статьи про фолио бронирования. Существующие темы:
    quick-start, check-in-out, night-audit. Раздел /bookings в quick-start упоминает
    создание бронирования и заселение/выселение, но не объясняет устройство
    вкладки Folio: окна, начисления, платежи, разделение баланса по плательщикам.
  actual: |
    FolioSection (apps/web/src/app/bookings/[id]/folio-section.tsx) под вкладкой Folio
    состоит из:

    **Окна фолио** (.folio-win, рендерятся стеком через folio.windows.map):
    - Заголовок: 'Window A · {label}' + payeeType + paymentMethod (серой строкой).
    - Две кнопки: Charge (начисление, зелёный '+') и Payment (платёж, иконка cash).
    - Инлайн-форма при клике по любой из них: select transactionCode (отфильтрован
      isManualPostAllowed=true), amount, description. Submit → POST
      /api/bookings/{id}/folio/post (charge) или /folio/payment (payment).
    - Таблица транзакций (table.t): Date, Code, Description, Debit, Credit, By.
      Credit подсвечен зелёным (var(--checked-in)). 'auto' подпись рядом с
      системно-сгенерированными записями (isSystemGenerated=true).
    - Строка totals: Posted (totalCharges), Paid (totalPayments), Balance. Balance
      имеет класс .v.pos / .v.neg / .v.zero в зависимости от знака — визуально
      красный / зелёный / серый.

    **Карточка 'Booking total'** (снизу, всегда присутствует):
    - Список .leg по каждому окну с его балансом.
    - Строка 'Due on checkout' (суммарный folio.balance).
    - Кнопка 'Accept payment' (видна только при balance>0) — открывает форму
      payment на активном окне.

    **Контракт API:**
    - GET /api/bookings/{id}/folio → { balance, transactions, summary, windows[] }.
    - POST .../folio/post — charges; требует transactionType=charge &&
      isManualPostAllowed=true, иначе 400 SYSTEM_ONLY_CODE. Также нужен
      booking.status ∈ {confirmed, checked_in}, иначе 400 INVALID_BOOKING_STATUS.
    - POST .../folio/payment — payments; аналогично, transactionType=payment.

    **Важное:**
    - Код ROOM (Room Charge) имеет isManualPostAllowed=false — это системная
      операция, начисляется ночной проверкой. Через UI руками вносится
      ADJ_ROOM / EXTRA_BED и другие manual-allowed коды.
    - Нет UI для void/correction: воидить запись нельзя через веб, только
      POST компенсирующей записи.
  rewrite: |
    ## Фолио бронирования (вкладка «Финансы»)

    Вкладка отображает финансовое состояние бронирования: что начислено, что
    получено, остаток к оплате. Состоит из одного или нескольких **окон фолио**
    и сводной карточки снизу.

    ### Окна фолио

    Каждая бронь имеет минимум одно окно (Window A — основной плательщик).
    Дополнительные окна (Window B, C…) открываются, если часть расходов
    переносится на компанию, турагента или другого гостя (routing).

    В заголовке окна видны:
    - **Буква и метка окна** (Window A · Peter Petrov).
    - **Тип плательщика** и метод оплаты (если известен).

    Две кнопки **+ Charge** (начисление) и **Payment** (платёж) открывают форму:
    - **Код операции** — список ограничен кодами, которые разрешено проводить
      вручную. Системные коды (напр. ROOM Charge из ночного аудита) в списке
      отсутствуют.
    - **Сумма** — с двумя знаками после запятой, минимум 0.01.
    - **Описание** — свободный текст, необязательно.

    После отправки таблица обновляется и баланс пересчитывается.

    ### Строка итогов

    Внизу окна:
    - **Начислено / Posted** — сумма всех debit-операций.
    - **Оплачено / Paid** — сумма всех credit-операций (зелёный).
    - **Баланс / Balance** — разница; красный при долге, серый при нуле.

    ### Карточка «Итого по брони»

    Показывает баланс по каждому окну и **«К оплате при выезде»** — общую сумму,
    которую гость должен закрыть перед check-out. Кнопка **«Принять платёж»**
    появляется только при положительном балансе и открывает форму платежа на
    активном окне.

    > **Ограничение:** void/коррекция записи в веб-интерфейсе пока не реализован.
    > Для обратной проводки вносите компенсирующую запись (например, ADJ_ROOM
    > на отрицательную сумму через сверку).

retro:
  time_minutes: 40
  unblocker_fixes:
    - "Выбор charge-кода ADJ_ROOM вместо ROOM: через GET /api/transaction-codes видно, что ROOM имеет isManualPostAllowed=false и API вернул бы 400 SYSTEM_ONLY_CODE. План описывал 'prefer ROOM' — скорректировано на 'prefer ADJ_ROOM' как единственный стабильно-постимый ROOM-group код"
    - "Scenario 04 ru-ветка: в seed нет бронирований с folio.balance===0, но есть окна с windows[i].balance===0 (мульти-оконные брони разделяют баланс по окнам — primary holds full, secondary=0). Используем .windows.some(w=>w.balance===0) вместо f.balance===0 для поиска кандидата. В итоге реальным попаданием стал BK_FOLIO после en-прогона, но scan робастен и найдёт secondary window в multi-оконных сценариях"
    - "BK_FOLIO выбирается с предпочтением single-window (чтобы scenario 04 однозначно наблюдал zero-balance), но fallback на multi-window есть — первая windows[0] в обоих случаях используется как WIN_A"
  methodology_deltas:
    - "Inline fixture helpers (getFolio, getFolioBalance, fetchTransactionCode, fetchCheckedInBookingWithWindows, fetchCheckedInBookingWithPositiveBalance) повторяют паттерн из секции 06 — это второй раз подряд, когда мы дублируем хелперы вокруг /folio и /transaction-codes. Сигнал для Batch A retro: вынести в shared fixture-слой. В секции 06 уже назван кандидат (fetchPayCashCodeId) — теперь добавлен более общий fetchTransactionCode(type, prefer)"
    - "В seed НЕТ бронирований с folio.balance===0 — scenario 04 'zero-state' наблюдается только ПОСЛЕ мутации (scenario 03) или на окнах с windowNumber>1 (они стартуют с 0). Это не баг UI, а свойство seed-fixture. Для read-only observation был бы нужен свеже-созданный booking без charges, что само по себе мутация"
    - "Endpoints /folio/post (charges) и /folio/payment (payments) — ДВА разных пути, не один с дискриминатором. UI роутит через postFormMode === 'payment' ? ...payment : ...post. План audit plan подразумевал единый endpoint — исправлено"
    - "Класс .v.pos/.v.neg/.v.zero применяется к .totals .v ВНУТРИ .folio-win, не к самому .folio-win. Важно для scenario 05 — первый вариант селектора '.folio-win.pos' не сработал бы"
    - "Empty-state 'No transactions' рендерится, но не встречается в запуске (attachment empty-state-count=0): seed не содержит окон без транзакций, а мутации добавляют, не удаляют. Покрытие этого empty-state нужно отдельно через booking.create fixture без auto-room-charges, что выходит за рамки секции 10"
    - "Scenario 02/03 надёжно работают через delta-проверки (preRowCount+1, deltaBalance=+1000) вместо absolute — позволяет повторные прогоны на shared state. На скриншоте видно, что BK_FOLIO накопил аудит-следы от прошлых запусков (несколько ADJ_ROOM audit-charge строк) — тест всё равно зелёный"
    - "Playwright selectOption через <select> работает с uuid value напрямую, никакого setNativeValue не потребовалось (в отличие от некоторых проверок на editable-date полях)"

