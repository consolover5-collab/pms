id: booking.folio
title: "Фолио бронирования — окна, начисления, платежи"
route: /bookings/[id] (FolioSection)
depends_on:
  - auth.login
  - property.select
  - business-date
  - booking.create
  - booking.detail
  - transaction-codes
locales_tested: [ru, en]

ui:
  header:
    ru: "FolioSection под вкладкой Финансы: окна .folio-win с формами начисления/платежа, таблицей транзакций, строкой totals, + карточка 'Итого по брони' снизу"
    en: "FolioSection under Folio tab: .folio-win windows with charge/payment forms, transactions table, totals row, + 'Booking total' card below"
  required_fields: []
  optional_fields:
    - { id: windowHeader, label: { ru: "Окно {A/B/…} · {label}", en: "Window {A/B/…} · {label}" }, kind: "heading", note: "windowLetter(windowNumber) + w.label; класс .folio-win > .fh > .ti" }
    - { id: windowPayee, label: { ru: "тип плательщика · метод оплаты", en: "payee type · payment method" }, kind: "text", note: ".fh > .who — отображает payeeType и paymentMethod через · разделитель; null → '—'" }
    - { id: chargeButton, label: { ru: "Начисление", en: "Charge" }, kind: "button", note: ".btn.xs; разворачивает inline <form> внутри окна" }
    - { id: paymentButton, label: { ru: "Платёж", en: "Payment" }, kind: "button", note: ".btn.xs; toggle-поведение: повторный клик закрывает форму" }
    - { id: codeSelect, label: { ru: "Код операции", en: "Transaction code" }, kind: "select", note: "select[name=codeId]; список отфильтрован по transactionType=charge|payment и isManualPostAllowed=true" }
    - { id: amountInput, label: { ru: "Сумма", en: "Amount" }, kind: "number", note: "input[name=amount]; type=number, step=0.01, min=0.01, required" }
    - { id: descriptionInput, label: { ru: "Описание", en: "Description" }, kind: "text", note: "input[name=description]; опциональное" }
    - { id: transactionsTable, label: { ru: "Таблица операций", en: "Transactions table" }, kind: "table", note: "table.t — колонки Date, Code, Description, Debit, Credit, By; credit окрашен .checked-in color" }
    - { id: noTransactionsEmpty, label: { ru: "Операций нет", en: "No transactions" }, kind: "empty-state", note: "показывается если winTxns.length===0 в окне" }
    - { id: totalsRow, label: { ru: "Начислено / Оплачено / Баланс", en: "Posted / Paid / Balance" }, kind: "row", note: ".totals с тремя .t: totalCharges, totalPayments, balance; balance имеет класс .v.pos/.v.neg/.v.zero" }
    - { id: bookingTotalCard, label: { ru: "Итого по брони", en: "Booking total" }, kind: "card", note: "список .leg по окнам + строка 'Due on checkout / К оплате при выезде'" }
    - { id: acceptPaymentButton, label: { ru: "Принять платёж", en: "Accept payment" }, kind: "button", note: ".btn.sm.primary; видна только при folio.balance>0; открывает форму payment на activeWin" }
  buttons:
    charge: { ru: "Начисление", en: "Charge" }
    payment: { ru: "Платёж", en: "Payment" }
    submit: { ru: "Внести начисление / Провести платёж", en: "Post Charge / Record Payment" }
    cancelForm: { ru: "Отмена", en: "Cancel" }
    acceptPayment: { ru: "Принять платёж", en: "Accept payment" }

steps:
  - id: "01-window-stack-render"
    action: "ru + en observation: открыть checked_in бронь с windows.length>=2. Все .folio-win видны одновременно (НЕ табнутое представление). Шапка первого окна содержит windowLetter(windowNumber)+label"
    screenshots:
      - 10-folio-01-window-stack-render-ru.png
      - 10-folio-01-window-stack-render-en.png
  - id: "02-post-charge"
    action: "en only: бронь BK_FOLIO в checked_in, window_A выбрано динамически. Клик Charge → форма появляется → select[name=codeId]=ADJ_ROOM, amount=1000, description='audit-charge'. Submit → POST /api/bookings/{id}/folio/post=201 → новая строка в таблице, balance окна +1000"
    screenshots:
      - 10-folio-02-post-charge-en.png
  - id: "03-post-payment"
    action: "en only: продолжение scenario 02. Клик Payment → форма → select PAY_CASH, amount=outstanding balance. Submit → POST /api/bookings/{id}/folio/payment=201 → folio.balance=0"
    screenshots:
      - 10-folio-03-post-payment-en.png
  - id: "04-zero-balance-window"
    action: "ru + en observation: после scenario 03 en-прогона BK_FOLIO.window_A имеет balance=0. Под en используем BK_FOLIO. Под ru — сканируем все checked_in брони, ищем окно с balance===0 (если его нет — skip). Проверяем, что .folio-win .totals .v.zero отрендерен хотя бы в одном окне. Attachment empty-state-count фиксирует, виден ли 'No transactions' / 'Операций нет' empty-state"
    screenshots:
      - 10-folio-04-zero-balance-window-ru.png
      - 10-folio-04-zero-balance-window-en.png
  - id: "05-positive-balance-highlight"
    action: "ru + en observation: открыть checked_in бронь с balance>0 (BK_POS, отличная от BK_FOLIO). Проверяем наличие класса .folio-win .totals .v.pos хотя бы у одного окна; 'Итого по брони' карточка видна"
    screenshots:
      - 10-folio-05-positive-balance-highlight-ru.png
      - 10-folio-05-positive-balance-highlight-en.png

edge_cases:
  - id: multi-window-stacked
    description: "Окна фолио рендерятся стеком, не табнутые"
    expected: "Все .folio-win одновременно видны; нет UI для переключения окон кроме активации формы charge/payment"
    observed: "OK — folio-section.tsx:179 делает folio.windows.map(), без табов. 2/2 локали; empirically multi-window-count=2, per-window-visible=[true,true]. Скриншот 01"
  - id: charge-post-happy-path
    description: "Manual-post charge через UI"
    expected: "POST /folio/post=201, новая строка появляется, balance окна растёт ровно на amount (если выбранный код без auto-tax)"
    observed: "OK — en only, ADJ_ROOM (charge, isManualPostAllowed=true) выбран динамически через GET /transaction-codes. POST /folio/post=201 (attachment post-charge-response). preRowCount инкрементировался на 1 (polled), delta balance=+1000 ровно. Скриншот 02. Примечание: код ROOM имеет isManualPostAllowed=false и системой отклонён бы кодом SYSTEM_ONLY_CODE — поэтому используем ADJ_ROOM"
  - id: payment-post-happy-path
    description: "Manual-post payment (PAY_CASH) через UI зануляет баланс"
    expected: "POST /folio/payment=201, folio.balance → 0"
    observed: "OK — en only, amount=текущему outstanding, polled до balance==0. Скриншот 03"
  - id: zero-balance-highlight
    description: "Когда window.balance===0, элемент .totals .v имеет класс .zero"
    expected: "Хотя бы один .folio-win .totals .v.zero виден"
    observed: "OK — en: window_A BK_FOLIO zeroed scenario 03 (attachment en-zero-precondition); ru: сканирование нашло кандидата среди checked_in броней (attachment ru-zero-window-candidate=GBH-000089 — одно из окон имеет balance=0). Класс .v.zero рендерится из folio-section.tsx:345 тернарным выражением. Скриншоты 04"
  - id: positive-balance-highlight
    description: "Когда window.balance>0, элемент .totals .v имеет класс .pos"
    expected: "Хотя бы один .folio-win .totals .v.pos виден на бронях с balance>0"
    observed: "OK — 2/2 локали. 20/20 checked_in броней seed имеют balance>0, так что кандидат всегда есть. Скриншот 05"
  - id: empty-window-rendering
    description: "Пустое окно фолио (transactions.length===0) показывает empty-state 'Операций нет'/'No transactions'"
    expected: "Если window без транзакций — рендерится empty-state блок вместо table.t"
    observed: "Нестабильно в seed: attachment empty-state-count=0 на scenario 04 (BK_FOLIO имеет транзакции даже после payment). Empty-state виден только на свежесозданных бронях до первой транзакции, или на окнах с payeeType != primary (routing/sharing). Сам рендер существует в folio-section.tsx:279-289 и локализован корректно, но эмпирически в запуске не сработал — нужна свежая бронь без charges. Помечено как observation-gap, не баг"
  - id: accept-payment-button-visibility
    description: "Кнопка 'Accept payment' внизу 'Booking total' видна только при folio.balance>0"
    expected: "balance>0 → кнопка видна; balance===0 → кнопка скрыта"
    observed: "OK — folio-section.tsx:405 гейт 'folio.balance > 0'. На скриншоте 02 (balance=1000) кнопка видна; на скриншоте 03 (balance=0) — исчезла. На скриншоте 05 (balance>0) — видна"
  - id: form-toggle-behavior
    description: "Повторный клик по Charge/Payment кнопке закрывает форму; клик между окнами переключает активное окно"
    expected: "postFormMode toggles null↔charge↔payment; activeWindowId всегда = кликнутому окну"
    observed: "OK — код folio-section.tsx:200 и 212 реализуют toggle. Сценарий 02/03 открывают форму один раз и сабмитят, закрытие через toggle не тестируется напрямую, но UI стабилен"
  - id: mutation-locale-split
    description: "Отличие от плана: мутирующие сценарии (02, 03) запускаются только под en"
    expected: "2 локали × 5 сценариев = 10 тестов"
    observed: "Фактически: observation-сценарии (01, 04, 05) — оба локали; мутирующие (02, 03) — en only. 8 passed + 2 skipped. Обоснование: idempotent-семантика мутаций дорогая (потребовала бы voids), а i18n-лейблы (Начисление/Charge, Платёж/Payment) проверены через read-only selector с exact-name и видны в стек-скриншотах 01/04/05 обеих локалей"

