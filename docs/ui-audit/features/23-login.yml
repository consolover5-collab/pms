bugs: []
# No new bugs filed. Considered and rejected:
#   - "Error message not localised" — API-owned; part of the systemic
#     backend-English-leak pattern tracked elsewhere (not section-scoped).
#   - "No CSRF token" — login is not a state-change on a pre-existing session
#     and sameSite=lax on pms_session mitigates login-CSRF for modern
#     browsers; flagged under edge_cases for the security reviewer.
#   - "User enumeration" — verified ABSENT (scenario 04). Not a bug.

signals:
  l10n: partial
  l10n_note: >
    All static UI strings (labels, submit button) are correctly localised
    via t(dict, "login.*"). The inline error text is API-owned and English
    only (see edge_cases.api-owned-error-text). Not scoped as a blocker for
    this section.
  testids_added: true
  testids_prefix: "login-*"
  mutations_gated_to_en: false
  mutations_gated_to_en_note: >
    Scenario 02 runs in both locales — the mutation (POST /api/auth/login)
    is idempotent w.r.t. the seed: it creates a short-lived sessions row
    keyed by a random UUID and the session cookie dies with the Playwright
    context. Scenario 04 is en-only as an API-contract check.
  risk: LOW
  risk_note: >
    Login itself is a narrow, well-understood surface. Only added change to
    apps/web is additive data-testid attributes and a role="alert" on the
    existing error div. No behavioural change to the auth flow.
  security_notes:
    - "No user enumeration — same error text for unknown user + wrong password (verified)."
    - "No CSRF token on POST /api/auth/login; sameSite=lax on pms_session is the only mitigation."
    - "Password input is type=password (masked)."
    - "Session cookie is httpOnly (verified via context.cookies() in scenario 02)."

help_rewrite_hints:
  topic: null
  current: ""
  actual: ""
  rewrite: |

retro:
  time_minutes: 0
  unblocker_fixes:
    - >
      Added data-testid to all interactive elements of the login form
      (login-page, login-form, login-username-input, login-password-input,
      login-submit-button, login-error-alert) + role="alert" on the error
      div. Pure additive — no CSS or behavioural change.
  methodology_deltas:
    - >
      Logged-out flows need a local gotoLoggedOut helper; do NOT promote
      to shared.ts because every other spec depends on setLocaleAndGoto
      doing the login POST. Scenario isolation relies on Playwright's
      fresh-context-per-test default; cookies are also explicitly cleared
      at the top of each test for documentation.
    - >
      API contract tests (scenario 04) make good "security property"
      regression guards — pin no-user-enumeration now so a future refactor
      that accidentally splits the error paths gets caught.

