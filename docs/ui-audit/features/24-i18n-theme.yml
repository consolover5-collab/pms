  - { method: GET,  path: "/api/properties",   status: 200, note: "topbar business-date fetches property id" }
  - { method: GET,  path: "/api/business-date?propertyId=...", status: 200, note: "topbar business-date badge" }

console_errors: []
network_errors: []

bugs: []
# No new bugs filed. Scenario 03 observed zero Cyrillic chrome leaks across
# all five sampled pages in en locale — the P1 preflight fixes (BUG-012,
# BUG-013, BUG-014 from commit dbd1563) have held. Future regressions that
# introduce new leaks will be caught by this spec's 03-no-hardcoded-strings
# scenario and should be filed as BUG-018+.

help_rewrite_hints:
  topic: null
  current: ""
  actual: ""
  rewrite: |

retro:
  time_minutes: 0
  unblocker_fixes:
    - >
      Added data-testid to topbar.tsx for locale-toggle wrapper, locale-en
      chip, locale-ru chip, theme-toggle button, and new-booking link.
      Also added aria-pressed to the locale chips so the toggle state is
      exposed to assistive tech. Pure additive — no CSS or behavioural
      change.
  methodology_deltas:
    - >
      Cross-cutting audits that sample multiple pages need a curated chrome
      selector set — scanning document.body wholesale false-positives on
      guest names. Walking up from each match to exclude tbody descendants
      (plus a future-proof data-user-content opt-in) is a cheap, robust
      filter.
    - >
      When asserting locale re-renders, pin CLIENT-rendered strings only
      (useLocale() subscribers, typically in topbar/sidebar/providers).
      Server-component strings (getLocale() from next/headers) will not
      re-render on setLocale() without a navigation. Noted in edge_cases;
      worth citing in a future methodology update.
    - >
      Regression gates for preflight fixes (BUG-012/013/014 here) are best
      expressed as pattern scans rather than pinned-string assertions —
      the scan catches new leaks of the same shape with no extra
      maintenance.

status: ok
last_audited: "2026-04-22"
screenshots_dir: docs/ui-audit/screenshots/
