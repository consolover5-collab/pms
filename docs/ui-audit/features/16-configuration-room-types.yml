    client_component: apps/web/src/app/configuration/room-types/room-types-list.tsx
    note: "Fully i18n'd via t(dict, 'roomTypes.*'). No hardcoded English. Clean."
    testids:
      - { id: room-types-title,  element: h1,                  added: true }
      - { id: room-types-add,    element: "Link (Add button)",  added: true }
      - { id: room-types-list,   element: "table.t",            added: true }
      - { id: room-type-row,     element: "tbody tr",           added: true, note: "also data-room-type-id={id}" }
      - { id: room-type-code,    element: "td (code)",          added: true }
      - { id: room-type-name,    element: "Link (name)",        added: true }
      - { id: room-type-rooms,   element: "Link (roomCount)",   added: true }
      - { id: room-type-edit,    element: "Link (Edit)",        added: true }
