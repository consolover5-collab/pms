  - id: BUG-015
    title: "Cashier: /api/cashier/current и /api/cashier/close возвращают 401 — смену невозможно загрузить/закрыть"
    severity: high
    status: open
    source: ui-audit/13-cashier
    files:
      - apps/api/src/app.ts
      - apps/api/src/routes/cashier.ts
      - apps/web/src/app/cashier/page.tsx
    lines: "app.ts:34; cashier.ts:62,96"
    description: |
      Маршрут /cashier фактически сломан в текущей сборке.

      Что наблюдается:
      (a) GET /api/cashier/current → 401 {code: "UNAUTHORIZED"} для любого
          залогиненного пользователя. В UI это проявляется как `session = null`
          в useEffect после fetchData; из-за этого всегда рендерится
          "no-session" карточка с формой открытия смены, даже если смена на
          самом деле открыта в БД.
      (b) POST /api/cashier/close → 401 (та же причина). Кнопка "Close session"
          в page-head рендерится только при session !== null, поэтому её
          невозможно нажать — закрытие смены недоступно из UI.
      (c) POST /api/cashier/open → 201, но userId сохраняется как null (см.
          cashier.ts:10 — `(request as any).user?.id || null`). Сразу после
          успешного POST'а страница вызывает fetchData() → GET /api/cashier/current
          снова 401 → UI остаётся в "no-session" состоянии. Пользователю кажется,
          что "ничего не произошло".

      Первопричина:
      apps/api/src/app.ts:34 — `await app.register(authPlugin);` закомментирован
      с комментарием "Auth plugin is disabled until the frontend auth UI is
      fully wired". Без authPlugin хук preHandler не выставляет request.user.
      Обработчики /api/cashier/current (cashier.ts:96) и /api/cashier/close
      (cashier.ts:62) безусловно разыменовывают request.user?.id и возвращают
      401, когда он undefined.

      Воспроизведение (manual probe, 2026-04-22):
        curl -c /tmp/c.txt -X POST http://localhost:3000/api/auth/login \
          -H 'Content-Type: application/json' \
          -d '{"username":"admin","password":"admin123"}'
        # → 200 + Set-Cookie: pms_session=...
        curl -b /tmp/c.txt http://localhost:3000/api/cashier/current
        # → {"error":"Authorization required","code":"UNAUTHORIZED"}

      Побочные эффекты:
      - KPI-сетка (turnover / charges / payments / shift#) никогда не
        рендерится — фича по сути не работает.
      - Таблица "Recent sessions" работает (GET /api/cashier/sessions не
        требует request.user), так что пользователь видит историю смен,
        но не может взаимодействовать с текущей.
      - Console error + network error 401 на каждой загрузке /cashier.
    fix: |
      Два варианта, любой решает проблему:

      (A) Включить authPlugin глобально — раскомментировать
      apps/api/src/app.ts:34 (`await app.register(authPlugin);`). Требует,
      чтобы все клиенты (UI + внешние) присылали pms_session cookie; SSR web
      уже пересылает cookie через rewrite, так что фронт не должен сломаться.
      Заодно закроет ту же дыру в других handler'ах, читающих request.user.

      (B) Локальный фикс: в cashier.ts ручно читать cookie через
      `request.cookies["pms_session"]` + lookup в sessions/users (по аналогии
      с apps/api/src/routes/auth.ts:66) и устанавливать request.user
      внутри cashier preHandler. Менее инвазивно, но дублирует логику
      authPlugin — временное решение.

      Рекомендация: (A), потому что это единственный честный фикс и
      разблокирует сценарии 01/02 аудита Cashier без "костыльных" ветвлений.

  - id: BUG-016
    title: "guarantee-codes: CRUD not implemented; hardcoded enum duplicated in booking-edit form"
    severity: medium
    status: closed
    source: ui-audit/20-configuration-guarantee-codes
    files:
      - apps/web/src/app/configuration/guarantee-codes/page.tsx
      - apps/web/src/app/bookings/[id]/edit/booking-edit-form.tsx
    lines: "page.tsx:1-76; booking-edit-form.tsx:609-613"
    summary: |
      /configuration/guarantee-codes is a read-only docs table of 5 hardcoded
      codes (cc_guaranteed, company_guaranteed, deposit_guaranteed,
      non_guaranteed, travel_agent_guaranteed). No API route exists
      (no apps/api/src/routes/guarantee-codes.ts, no GET/POST/PUT/DELETE
      /api/guarantee-codes endpoint). The booking-edit form independently
      hardcodes the same 5 codes as <option> elements at
      booking-edit-form.tsx:609-613 — so the config page is not even the
      source of truth for the enum it documents. Consistency is maintained
      only by developer vigilance.
      severity: medium because divergence between the two hardcoded lists
      silently produces forms that accept values the docs page doesn't list
      (or vice versa).
    repro: |
      1. Open /configuration/guarantee-codes — note static list, no edit/delete UI.
      2. curl -s http://localhost:3001/api/guarantee-codes → 404 (route not registered).
      3. Open apps/web/src/app/bookings/[id]/edit/booking-edit-form.tsx:609-613
         → observe same 5 codes hardcoded as <option> values.
    fix_options:
      - "(A) Promote to full CRUD: add guarantee_codes table + API + swap both
        the config page and booking-edit form to fetch from the API. Resolves
        both the missing CRUD and the double-hardcoded enum."
      - "(B) Keep as enum: delete /configuration/guarantee-codes page (it
        documents an enum that lives in the codebase), and instead
        centralise the enum in a shared constants module imported by both
        booking-edit-form and any future display UI. Resolves the double-
        hardcoded enum but not the 'why is there a config page for this'
        expectation."

  - id: BUG-017
    title: "config/profiles: list truncated to 50 of 153 rows; no pagination, no limit param"
    severity: medium
    status: closed
    source: ui-audit/21-configuration-profiles
    files:
      - apps/web/src/app/configuration/profiles/page.tsx
      - apps/web/src/app/configuration/profiles/profiles-list.tsx
    lines: "page.tsx:28-34; profiles-list.tsx:153-158"
    summary: |
      /configuration/profiles calls GET /api/profiles without a ?limit= query
      parameter. The API default is limit=50 (max=100), so on property GBH the
      page renders only 50 rows out of 153 total profiles (133 individuals +
      10 companies + 6 travel_agents + 4 sources, probed 2026-04-22). The
      count badge shows "50" because it displays profiles.length (the rendered
      array size), not the DB total — users see no indication that 103 rows
      are silently hidden.

      There is no pagination UI on this page. For scope, the only other
      verified fact in this report is that /guests explicitly sets
      limit=PAGE_SIZE=50 in apps/web/src/app/guests/page.tsx:41; pagination
      behaviour on that sibling page is outside this bug's scope.
      Tab-switching (individual/company/travel_agent/source) works around
      the issue for 3 of 4 types because their per-type totals are ≤ 50,
      but individuals (133) are truncated on the "All" and "Guests" tabs.
      severity: medium because data is silently hidden and the UI gives no
      signal (no "showing 50 of 153", no next page, no sort).
    repro: |
      1. Probe (property GBH = ff1d9135-dfb9-4baa-be46-0e739cd26dad):
         curl -s "http://localhost:3000/api/profiles?propertyId=ff1d9135-dfb9-4baa-be46-0e739cd26dad&limit=1" \
           → total=153
      2. Open /configuration/profiles → count badge shows "50", table has 50 rows.
      3. Click tab "Guests" (type=individual, total=133) → still 50 rows.
      4. Verify no pagination controls exist anywhere on the page.
    fix_options:
      - "(A) Add pagination UI mirroring /guests (PAGE_SIZE=50 with prev/next
        + showing/total strings). Uses the same /api/profiles endpoint which
        already returns total."
      - "(B) Request all profiles at once: set &limit=500 (or unbounded)
        in page.tsx. Simpler but scales badly — at 500+ profiles the page
        weight and render cost grow unboundedly."
      - "(C, companion to A or B, not a standalone fix): show the count
        badge as the API's `total` field instead of `profiles.length`. On
        its own this just surfaces the gap (badge \"153\" next to a 50-row
        list) — it only becomes a real fix when paired with (A) pagination
        UI or (B) `?limit=<large>` so the user can actually reach the
        hidden 103 rows."
